services:

  db:
    image: postgres:14
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - urlshortener

  app:
    container_name: urlshortener_app
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000
    restart: unless-stopped
    working_dir: /var/www/
    depends_on:
      - db
      - redis
    environment:
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: client_host=host.docker.internal
    volumes:
      - ./:/var/www
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - urlshortener
    env_file:
      - .env

  nginx:
    container_name: urlshortener_nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8011:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/:/etc/nginx/conf.d/
    networks:
      - urlshortener

  redis:
    container_name: urlshortener_redis
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - urlshortener

  worker:
    container_name: urlshortener_worker
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan shorturl:process-clicks
    restart: unless-stopped
    volumes:
      - .:/var/www
    depends_on:
      - redis
      - db
    networks:
      - urlshortener
    env_file:
      - .env

  flushclicks:
    container_name: urlshortener_flushclicks
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan shorturl:flush-clicks
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - urlshortener
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      app:
        condition: service_started
    env_file:
      - .env

  warmup:
    container_name: urlshortener_warmup
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan shorturl:sync-bloom
    restart: no
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - urlshortener
    env_file:
      - .env

networks:
  urlshortener:
    driver: bridge

volumes:
  postgres_data:

